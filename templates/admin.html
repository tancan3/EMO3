<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 — 心愈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    :root {
      --bg-main: #f8fafc;
      --sidebar-bg: #ffffff;
      --accent-color: #4f772d;
      --accent-soft: #ecf3e9;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --radius-lg: 16px;
      --radius-md: 10px;
      --admin-border: #e2e8f0;
      --admin-muted: #64748b;
    }

    body {
      margin: 0;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .admin-wrapper { display:flex; min-height:100vh; }
    .admin-sidebar {
      width:260px; background:var(--sidebar-bg); border-right:1px solid var(--border-color);
      display:flex; flex-direction:column; position:sticky; top:0; height:100vh; padding:24px 16px;
    }
    .brand-area { padding:0 12px 32px; display:flex; align-items:center; gap:10px; }
    .brand-logo { width:32px; height:32px; background:var(--accent-color); border-radius:8px; display:flex; align-items:center; justify-content:center; color:#fff; }
    .nav-group-title { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.05em; margin:20px 12px 8px; }
    .admin-nav-btn {
      display:flex; align-items:center; gap:12px; width:100%; padding:12px 14px; margin-bottom:4px;
      border:none; background:transparent; color:var(--text-muted); border-radius:var(--radius-md);
      cursor:pointer; font-weight:500; font-size:14px; transition:all .2s;
    }
    .admin-nav-btn svg { width:18px; height:18px; }
    .admin-nav-btn:hover { background:var(--bg-main); color:var(--text-main); }
    .admin-nav-btn.active { background:var(--accent-soft); color:var(--accent-color); }

    .admin-container { flex:1; padding:32px; max-width:1400px; margin:0 auto; width:100%; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; }

    .admin-main{background:#fff;border:1px solid var(--border-color);border-radius:var(--radius-lg);padding:18px;min-height:calc(100vh - 150px);box-shadow:var(--card-shadow)}
    .admin-section{background:#fff;border:1px solid var(--border-color);border-radius:14px;padding:14px;}
    .admin-section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;}
    .risk-pill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:700;border:1px solid transparent;}
    .pill-low{background:#ecfdf5;color:#166534;border-color:#bbf7d0;}
    .pill-medium{background:#fffbeb;color:#92400e;border-color:#fde68a;}
    .pill-high{background:#fff7ed;color:#9a3412;border-color:#fdba74;}
    .pill-critical{background:#fef2f2;color:#991b1b;border-color:#fecaca;}
    .admin-modal{width:min(960px,92vw);max-height:86vh;overflow:auto;padding:18px;border-radius:16px;border:1px solid var(--border-color);background:#fff;}
    .btn-danger-soft,.btn-secondary-soft,.btn-primary-soft{border-radius:10px;padding:6px 10px;cursor:pointer;font-size:12px;font-weight:600;transition:all .18s ease;}
    .btn-danger-soft{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}
    .btn-secondary-soft{background:#f8fafc;border:1px solid #e2e8f0;color:#334155;}
    .btn-primary-soft{background:#ecf3e9;border:1px solid #d9e4d2;color:#4f772d;}
    .admin-empty{padding:38px 14px;text-align:center;color:var(--text-muted);font-size:13px;background:#fafcf8;border:1px dashed #dce7d8;border-radius:12px;}
    .admin-table table{width:100%;border-collapse:separate;border-spacing:0;}
    .admin-table th,.admin-table td{padding:11px 9px;border-bottom:1px solid #edf2ea;text-align:left;font-size:12px;white-space:nowrap;}
    .admin-table th{background:#f5f9f2;color:#466240;font-weight:700;position:sticky;top:0;z-index:1;}

    @media (max-width:1024px){
      .admin-sidebar{width:80px;padding:24px 8px;}
      .admin-sidebar .nav-group-title,.admin-sidebar span{display:none;}
      .admin-nav-btn{justify-content:center;}
      .admin-container{padding:16px;}
    }
  </style>
</head>
<body>
<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="brand-area">
      <div class="brand-logo"><i data-lucide="heart"></i></div>
      <span style="font-size:18px; font-weight:700;">心愈 Admin</span>
    </div>

    <div class="nav-group-title">Main</div>
    <button id="btn-dashboard" class="admin-nav-btn" onclick="switchTab('dashboard')">
      <i data-lucide="layout-dashboard"></i><span>仪表盘</span>
    </button>
    <button id="btn-risk" class="admin-nav-btn" onclick="switchTab('risk')">
      <i data-lucide="shield-alert"></i><span>风险监控</span>
    </button>

    <div class="nav-group-title">Content</div>
    <button id="btn-posts" class="admin-nav-btn" onclick="switchTab('posts')">
      <i data-lucide="message-square"></i><span>帖子管理</span>
    </button>
    <button id="btn-comments" class="admin-nav-btn" onclick="switchTab('comments')">
      <i data-lucide="message-circle"></i><span>评论管理</span>
    </button>

    <div class="nav-group-title">System</div>
    <button id="btn-logs" class="admin-nav-btn" onclick="switchTab('logs')">
      <i data-lucide="file-text"></i><span>审计日志</span>
    </button>

    <div style="margin-top:auto; padding-top:20px;">
      <a href="/logout" class="admin-nav-btn" style="color:#ef4444;text-decoration:none;">
        <i data-lucide="log-out"></i><span>退出登录</span>
      </a>
    </div>

    <div style="margin-top:16px;padding:14px;border:1px solid var(--border-color);border-radius:12px;background:#fff;">
      <div style="font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:10px;">数据库管理（仅管理员）</div>
      <a href="/admin/download-db" class="btn btn-sm" style="width:100%;justify-content:center;background:#4f772d;color:#fff;margin-bottom:10px;">下载数据库（备份）</a>
      <form action="/admin/upload-db" method="POST" enctype="multipart/form-data" style="display:flex;flex-direction:column;gap:8px;">
        <input type="file" name="db_file" accept=".db" required class="input-field" style="padding:8px 10px;font-size:12px;">
        <button type="submit" class="btn btn-sm" style="width:100%;justify-content:center;background:#b91c1c;color:#fff;">上传并覆盖数据库</button>
      </form>
    </div>
  </aside>

  <main class="admin-container">
    <header class="admin-header">
      <div>
        <h1 style="font-size:24px;font-weight:700;margin:0;">欢迎回来，{{ session.get('username','管理员') }}</h1>
        <p style="color:var(--text-muted);margin-top:4px;">这是您今天的系统概览。</p>
      </div>
      <div id="current-time" style="color:var(--text-muted); font-size:14px;"></div>
    </header>

    <div class="admin-main">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div style="margin-bottom:12px;display:grid;gap:8px;">
            {% for msg in messages %}
              <div style="padding:10px 12px;border-radius:10px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a;font-size:13px;">{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <div id="admin-content">加载中...</div>
    </div>
  </main>
</div>

<div id="risk-modal" style="display:none; position:fixed; inset:0; background:rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); z-index:1000; align-items:center; justify-content:center;">
  <div class="admin-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <h3 style="margin:0;">风险详情分析</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeRiskModal()">关闭</button>
    </div>
    <div id="risk-modal-body">加载中...</div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script>
let currentTab='dashboard';
let dashboardCharts={risk:null,trend:null,mbti:null};
let detailCharts={radar:null,history:null};
let logsActionChart=null;

// 初始化图标
lucide.createIcons();

// 显示实时时间
function updateTime(){
  const now = new Date();
  const t = document.getElementById('current-time');
  if(t) t.innerText = now.toLocaleString();
}
setInterval(updateTime,1000);
updateTime();

const state={
  posts:{page:1,page_size:10,keyword:''},
  comments:{page:1,page_size:10,keyword:''},
  logs:{page:1,page_size:10,admin_name:'',action:'',date_from:'',date_to:''},
  risk:{watch_only:false,level:'',page:1,page_size:10}
};

function card(title,val){
  return `<div style="padding:14px 16px;border:1px solid var(--admin-border);border-radius:14px;background:#fff;min-height:86px;"><div style="font-size:12px;color:var(--admin-muted);">${title}</div><div style="font-size:26px;font-weight:800;color:#2d4a2b;margin-top:4px;">${val}</div></div>`;
}

function askReason(actionLabel){
  const reason = prompt(`请确认操作：${actionLabel}\n请输入操作原因（必填）:`,'');
  if(!reason || !reason.trim()){
    alert('必须填写操作原因');
    return null;
  }
  return reason.trim();
}

async function requestWithReason(url, method, actionLabel){
  const reason = askReason(actionLabel);
  if(!reason) return {ok:false};
  const ok = confirm(`确认执行：${actionLabel}？`);
  if(!ok) return {ok:false};
  const res = await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify({reason})});
  const data = await res.json().catch(()=>({}));
  if(!res.ok){
    alert(data.error || '操作失败');
    return {ok:false};
  }
  return {ok:true,data};
}

function renderToolbar({keywordId='',onSearch='',extra=''}){
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">${keywordId?`<input id="${keywordId}" class="input-field" placeholder="关键词搜索" style="max-width:220px;">`:''}<button class="btn btn-primary btn-sm" onclick="${onSearch}">查询</button>${extra}</div>`;
}

function renderPagination({page,page_size,total,onChange,onPageSizeChange}){
  const totalPages=Math.max(1,Math.ceil((total||0)/(page_size||1)));
  const safePage=Math.min(Math.max(1,page), totalPages);
  const sizeChange = onPageSizeChange || '';
  return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;font-size:12px;color:var(--admin-muted);flex-wrap:wrap;">
    <span>第 ${safePage}/${totalPages} 页 · 共 ${total} 条</span>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <label style="display:flex;align-items:center;gap:4px;">每页
        <select ${sizeChange?`onchange="${sizeChange}(this.value)"`:''} style="height:28px;border:1px solid var(--border);border-radius:8px;padding:0 6px;background:#fff;">
          <option value="10" ${Number(page_size)===10?'selected':''}>10</option>
          <option value="20" ${Number(page_size)===20?'selected':''}>20</option>
          <option value="50" ${Number(page_size)===50?'selected':''}>50</option>
        </select>
      </label>
      <button class="btn btn-ghost btn-sm" ${safePage<=1?'disabled':''} onclick="${onChange}(${safePage-1})">上一页</button>
      <button class="btn btn-ghost btn-sm" ${safePage>=totalPages?'disabled':''} onclick="${onChange}(${safePage+1})">下一页</button>
      <label style="display:flex;align-items:center;gap:4px;">跳转
        <input id="pg-jump-${onChange}" type="number" min="1" max="${totalPages}" value="${safePage}" style="width:68px;height:28px;border:1px solid var(--border);border-radius:8px;padding:0 6px;">
      </label>
      <button class="btn btn-ghost btn-sm" onclick="${onChange}(Number(document.getElementById('pg-jump-${onChange}').value||1))">GO</button>
    </div>
  </div>`;
}

function riskLevelPill(level){
  const lv=(level||'').toUpperCase();
  if(lv==='LOW') return '<span class="risk-pill pill-low">LOW</span>';
  if(lv==='MEDIUM') return '<span class="risk-pill pill-medium">MEDIUM</span>';
  if(lv==='CRITICAL') return '<span class="risk-pill pill-critical">CRITICAL</span>';
  return '<span class="risk-pill pill-high">HIGH</span>';
}

async function renderDashboard(){
  const el=document.getElementById('admin-content');
  el.innerHTML='<div class="admin-empty">加载中...</div>';

  const r=await fetch('/api/admin/stats');
  const d=await r.json();

  el.innerHTML = `
    <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:24px;">
      <div class="stat-card" style="background:#fff;padding:24px;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);"><div class="label" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">用户总数</div><div class="value" style="font-size:28px;font-weight:700;">${d.total_users||0}</div></div>
      <div class="stat-card" style="background:#fff;padding:24px;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);"><div class="label" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">今日活跃</div><div class="value" style="font-size:28px;font-weight:700;">${d.today_active||0}</div></div>
      <div class="stat-card" style="background:#fff;padding:24px;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);"><div class="label" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">测评总数</div><div class="value" style="font-size:28px;font-weight:700;">${d.total_assessments||0}</div></div>
      <div class="stat-card" style="background:#fff;padding:24px;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);"><div class="label" style="font-size:14px;color:var(--text-muted);margin-bottom:8px;">高风险预警</div><div class="value" style="font-size:28px;font-weight:700;color:#ef4444;">${d.high_risk_users||0}</div></div>
    </div>

    <div style="display:grid;grid-template-columns:2fr 1fr;gap:24px;">
      <div class="content-card" style="background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
        <h3 style="margin-top:0;margin-bottom:20px;font-size:16px;">近7天活跃与风险趋势</h3>
        <div style="height:300px;"><canvas id="trend-chart"></canvas></div>
      </div>
      <div class="content-card" style="background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
        <h3 style="margin-top:0;margin-bottom:20px;font-size:16px;">风险等级分布</h3>
        <div style="height:300px;"><canvas id="risk-dist-chart"></canvas></div>
      </div>
    </div>

    <div class="content-card" style="margin-top:24px;background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
      <h3 style="margin-top:0;margin-bottom:20px;font-size:16px;">MBTI 分布（仅汇总）</h3>
      <div style="height:300px;"><canvas id="mbti-dist-chart"></canvas></div>
      <div style="margin-top:8px;font-size:12px;color:var(--text-muted);">仅展示各类型人数汇总，不展示个人隐私明细。</div>
    </div>
  `;

  if(dashboardCharts.risk) dashboardCharts.risk.destroy();
  if(dashboardCharts.trend) dashboardCharts.trend.destroy();
  if(dashboardCharts.mbti) dashboardCharts.mbti.destroy();

  dashboardCharts.risk = new Chart(document.getElementById('risk-dist-chart').getContext('2d'), {
    type:'doughnut',
    data:{
      labels:['LOW','MEDIUM','HIGH','CRITICAL'],
      datasets:[{
        data:[d.risk_distribution?.LOW||0,d.risk_distribution?.MEDIUM||0,d.risk_distribution?.HIGH||0,d.risk_distribution?.CRITICAL||0],
        backgroundColor:['#bbf7d0','#fde68a','#fb923c','#f87171'],
        borderWidth:0
      }]
    },
    options:{responsive:true,maintainAspectRatio:false,cutout:'70%',plugins:{legend:{position:'bottom'}}}
  });

  dashboardCharts.trend = new Chart(document.getElementById('trend-chart').getContext('2d'), {
    type:'line',
    data:{
      labels:(d.trend_7d||[]).map(x=>x.d),
      datasets:[
        {label:'总测评',data:(d.trend_7d||[]).map(x=>x.total),borderColor:'#4f772d',tension:0.4,fill:true,backgroundColor:'rgba(79,119,45,.08)'},
        {label:'高风险',data:(d.trend_7d||[]).map(x=>x.high),borderColor:'#ef4444',tension:0.4}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });

  const mbtiDist = Array.isArray(d.mbti_distribution) ? d.mbti_distribution : [];
  dashboardCharts.mbti = new Chart(document.getElementById('mbti-dist-chart').getContext('2d'), {
    type:'bar',
    data:{
      labels: mbtiDist.map(x=>x.type),
      datasets:[{label:'人数',data:mbtiDist.map(x=>x.count),backgroundColor:'#4f772d'}]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });
}

async function renderRisk(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="content-card" style="background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
      <div class="admin-section-head" style="margin-bottom:16px;">
        <h3 style="margin:0;font-size:18px;">风险用户监控</h3>
        <span style="font-size:12px;color:var(--text-muted);">支持筛选 + 关注追踪</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;">
        <select id="risk-level" class="input-field" style="max-width:160px"><option value="">全部等级</option><option value="HIGH">HIGH</option><option value="CRITICAL">CRITICAL</option></select>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);"><input id="risk-watch-only" type="checkbox"> 仅关注</label>
        <button class="btn btn-primary btn-sm" onclick="applyRiskFilter()">筛选</button>
      </div>
      <div id="risk-table-wrap"></div>
      <div id="risk-pagination"></div>
    </div>`;
  document.getElementById('risk-level').value=state.risk.level;
  document.getElementById('risk-watch-only').checked=state.risk.watch_only;
  await loadRiskList();
}

function applyRiskFilter(){
  state.risk.page = 1;
  loadRiskList();
}

function changeRiskPage(p){
  state.risk.page = Math.max(1,Number(p||1));
  loadRiskList();
}

function changeRiskPageSize(v){
  state.risk.page_size = Number(v||10);
  state.risk.page = 1;
  loadRiskList();
}

async function loadRiskList(){
  state.risk.level=(document.getElementById('risk-level')?.value||'').trim();
  state.risk.watch_only=!!document.getElementById('risk-watch-only')?.checked;
  const qs=new URLSearchParams({level:state.risk.level,watch_only:String(state.risk.watch_only),page:String(state.risk.page),page_size:String(state.risk.page_size)});
  const r=await fetch('/api/admin/risk-users?'+qs.toString());
  const data=await r.json();
  const rows=Array.isArray(data) ? data : (data.items||[]);
  const page=Array.isArray(data) ? 1 : (data.page||1);
  const pageSize=Array.isArray(data) ? 10 : (data.page_size||10);
  const total=Array.isArray(data) ? rows.length : (data.total||0);

  document.getElementById('risk-table-wrap').innerHTML = rows.length
    ? `<div class="admin-table" style="overflow:auto;"><table style="width:100%;font-size:12px;"><tr><th>用户</th><th>风险分数</th><th>等级</th><th>来源</th><th>时间</th><th>关注</th><th>备注</th><th>操作</th></tr>${rows.map(x=>`<tr><td>${x.username}</td><td>${x.risk_score}</td><td>${riskLevelPill(x.risk_level)}</td><td>${x.source}</td><td>${x.updated_at}</td><td>${x.is_watched?`已关注<br><span style='color:#64748b;'>${x.watched_at||''}</span>`:'未关注'}</td><td>${x.watch_note||''}</td><td><button class="btn-secondary-soft" onclick="toggleWatch(${x.record_id}, ${x.is_watched})">${x.is_watched?'取消关注':'标记关注'}</button> <button class="btn-secondary-soft" onclick="openRiskDetail(${x.record_id})">查看详情</button></td></tr>`).join('')}</table></div>`
    : `<div class="admin-empty">暂无符合筛选条件的风险用户</div>`;

  document.getElementById('risk-pagination').innerHTML = renderPagination({
    page,
    page_size: pageSize,
    total,
    onChange: 'changeRiskPage',
    onPageSizeChange: 'changeRiskPageSize'
  });
}

async function toggleWatch(recordId,isWatched,currentNote=''){
  const watched = !!isWatched;
  const url = watched ? `/api/admin/risk-users/${recordId}/unwatch` : `/api/admin/risk-users/${recordId}/watch`;
  let payload={};
  if(!watched){
    const note = prompt('请输入关注备注（可选）', currentNote || '');
    if(note===null) return;
    payload={watch_note:(note||'').trim()};
  }
  const res = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const d = await res.json().catch(()=>({}));
  if(!res.ok){ alert(d.error||'操作失败'); return; }
  await loadRiskList();
  const modal=document.getElementById('risk-modal');
  if(modal && modal.style.display==='flex'){
    await openRiskDetail(recordId);
  }
}

async function openRiskDetail(recordId){
  const modal=document.getElementById('risk-modal');
  const body=document.getElementById('risk-modal-body');
  modal.style.display='flex';
  body.innerHTML='加载中...';
  const r=await fetch(`/api/admin/risk-users/${recordId}`);
  const d=await r.json();

  body.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="admin-section">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;">心理雷达图（6维）</div>
        <div style="height:280px"><canvas id="risk-radar"></canvas></div>
      </div>
      <div class="admin-section">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px;">历史趋势</div>
        <div style="height:280px"><canvas id="risk-history"></canvas></div>
      </div>
    </div>
    <div class="admin-section" style="margin-top:12px;">
      <div><b>用户：</b>${d.username}</div>
      <div><b>风险等级：</b>${riskLevelPill(d.risk_level)} / <b>分数：</b>${d.risk_score}</div>
      <div><b>模态权重：</b>text=${d.weights.text}, speech=${d.weights.speech}, face=${d.weights.face}</div>
      <div><b>解释：</b>${d.explanation}</div>
      <div><b>关注状态：</b>${d.is_watched?'已关注':'未关注'} ${d.watched_at?`（${d.watched_at}）`:''}</div>
      <div><b>关注备注：</b>${d.watch_note||'无'}</div>
      <div style="margin-top:10px;display:flex;gap:8px;"><button class="btn btn-primary btn-sm" onclick="toggleWatch(${d.record_id}, ${d.is_watched})">${d.is_watched?'取消关注':'标记关注'}</button><button class="btn btn-ghost btn-sm" onclick="closeRiskModal()">关闭</button></div>
    </div>`;

  if(detailCharts.radar) detailCharts.radar.destroy();
  if(detailCharts.history) detailCharts.history.destroy();

  detailCharts.radar = new Chart(document.getElementById('risk-radar').getContext('2d'),{
    type:'radar',
    data:{
      labels:['depression','anxiety','stress','interpersonal','self_esteem_risk','sleep'],
      datasets:[{label:'risk',data:[d.radar.depression,d.radar.anxiety,d.radar.stress,d.radar.interpersonal,d.radar.self_esteem_risk,d.radar.sleep],borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.2)'}]
    },
    options:{responsive:true,maintainAspectRatio:false,scales:{r:{min:0,max:1}}}
  });

  detailCharts.history = new Chart(document.getElementById('risk-history').getContext('2d'),{
    type:'line',
    data:{
      labels:(d.history||[]).map(x=>x.created_at),
      datasets:[
        {label:'PHQ-9',data:(d.history||[]).map(x=>x.phq_score),borderColor:'#2563eb',tension:.3},
        {label:'GAD',data:(d.history||[]).map(x=>x.anxiety_score),borderColor:'#f59e0b',tension:.3}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false}
  });
}

function closeRiskModal(){
  document.getElementById('risk-modal').style.display='none';
}

async function renderPosts(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="content-card" style="background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
      <div class="admin-section-head" style="margin-bottom:16px;">
        <h3 style="margin:0;font-size:18px;">帖子管理</h3>
        <span style="font-size:12px;color:var(--text-muted);">社区内容审核</span>
      </div>
      ${renderToolbar({keywordId:'posts-keyword',onSearch:'searchPosts()'})}
      <div id="posts-table"></div>
    </div>`;
  document.getElementById('posts-keyword').value=state.posts.keyword;
  await loadPosts();
}

function searchPosts(){ state.posts.keyword=(document.getElementById('posts-keyword')?.value||'').trim(); state.posts.page=1; loadPosts(); }
function changePostsPage(p){ state.posts.page=Math.max(1,Number(p||1)); loadPosts(); }
function changePostsPageSize(v){ state.posts.page_size=Number(v||10); state.posts.page=1; loadPosts(); }

async function loadPosts(){
  const qs=new URLSearchParams({page:String(state.posts.page),page_size:String(state.posts.page_size),keyword:state.posts.keyword});
  const r=await fetch('/api/admin/posts?'+qs.toString());
  const d=await r.json();
  document.getElementById('posts-table').innerHTML = (d.items||[]).length
    ? `<div class="admin-table" style="overflow:auto;"><table style="width:100%;font-size:12px;"><tr><th>ID</th><th>用户</th><th>内容</th><th>隐藏</th><th>操作</th></tr>${d.items.map(x=>`<tr><td>${x.id}</td><td>${x.username||''}</td><td>${(x.content||'').slice(0,30)}</td><td>${x.is_hidden}</td><td><button class="btn-secondary-soft" onclick="handlePostAction(${x.id},'hide')">隐藏</button> <button class="btn-secondary-soft" onclick="handlePostAction(${x.id},'restore')">恢复</button> <button class="btn-danger-soft" onclick="handlePostDelete(${x.id})">删除</button></td></tr>`).join('')}</table></div>${renderPagination({page:d.page,page_size:d.page_size,total:d.total,onChange:'changePostsPage',onPageSizeChange:'changePostsPageSize'})}`
    : `<div class="admin-empty">暂无帖子数据</div>`;
}

async function handlePostAction(id,action){
  const res=await requestWithReason(`/api/admin/posts/${id}/${action}`,'POST',`帖子${action}`);
  if(res.ok) loadPosts();
}

async function handlePostDelete(id){
  const res=await requestWithReason(`/api/admin/posts/${id}`,'DELETE','删除帖子');
  if(res.ok) loadPosts();
}

async function renderLogs(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="content-card" style="background:#fff;border-radius:16px;border:1px solid var(--border-color);box-shadow:var(--card-shadow);padding:24px;">
      <div class="admin-section-head" style="margin-bottom:16px;"><h3 style="margin:0;font-size:18px;">审计日志</h3><span style="font-size:12px;color:var(--text-muted);">管理员操作留痕</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
        <input id="f-admin" class="input-field" style="max-width:160px" placeholder="管理员">
        <select id="f-action" class="input-field" style="max-width:140px"><option value="">全部操作</option><option value="hide">hide</option><option value="restore">restore</option><option value="delete">delete</option><option value="watch">watch</option><option value="unwatch">unwatch</option></select>
        <input id="f-from" type="date" class="input-field">
        <input id="f-to" type="date" class="input-field">
        <button class="btn btn-primary btn-sm" onclick="searchLogs()">筛选</button>
      </div>
      <div style="height:220px;border:1px solid var(--border-color);border-radius:12px;padding:10px;margin-bottom:10px;background:#fff;"><canvas id="log-action-chart"></canvas></div>
      <div id="log-table"></div>
    </div>
  `;
  document.getElementById('f-admin').value=state.logs.admin_name;
  document.getElementById('f-action').value=state.logs.action;
  document.getElementById('f-from').value=state.logs.date_from;
  document.getElementById('f-to').value=state.logs.date_to;
  await loadLogs();
}

function searchLogs(){
  state.logs.admin_name=(document.getElementById('f-admin')?.value||'').trim();
  state.logs.action=(document.getElementById('f-action')?.value||'').trim();
  state.logs.date_from=(document.getElementById('f-from')?.value||'').trim();
  state.logs.date_to=(document.getElementById('f-to')?.value||'').trim();
  state.logs.page=1;
  loadLogs();
}
function changeLogsPage(p){ state.logs.page=Math.max(1,Number(p||1)); loadLogs(); }
function changeLogsPageSize(v){ state.logs.page_size=Number(v||10); state.logs.page=1; loadLogs(); }

async function loadLogs(){
  const qs=new URLSearchParams({page:String(state.logs.page),page_size:String(state.logs.page_size),admin_name:state.logs.admin_name,action:state.logs.action,date_from:state.logs.date_from,date_to:state.logs.date_to});
  const r=await fetch('/api/admin/audit-logs?'+qs.toString());
  const d=await r.json();

  const stat=d.action_stats||{};
  const labels=Object.keys(stat); const values=labels.map(k=>stat[k]);
  if(logsActionChart) logsActionChart.destroy();
  logsActionChart = new Chart(document.getElementById('log-action-chart').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[{label:'次数',data:values,backgroundColor:'#60a5fa'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
  });

  document.getElementById('log-table').innerHTML = (d.items||[]).length
    ? `<div class="admin-table" style="overflow:auto;"><table style="width:100%;font-size:12px;"><tr><th>时间</th><th>管理员</th><th>操作</th><th>对象</th><th>原因</th></tr>${(d.items||[]).map(x=>`<tr><td>${x.created_at}</td><td>${x.admin_name}</td><td>${x.action}</td><td>${x.target_type}#${x.target_id}</td><td>${x.reason||''}</td></tr>`).join('')}</table></div>${renderPagination({page:d.page,page_size:d.page_size,total:d.total,onChange:'changeLogsPage',onPageSizeChange:'changeLogsPageSize'})}`
    : `<div class="admin-empty">暂无审计日志数据</div>`;
}

function setActiveNav(tab){
  ['dashboard','risk','posts','comments','logs'].forEach(x=>{
    const el=document.getElementById(`btn-${x}`);
    if(el) el.classList.toggle('active', x===tab);
  });
}

async function switchTab(tab){
  currentTab=tab;
  setActiveNav(tab);
  if(tab==='dashboard') return renderDashboard();
  if(tab==='risk') return renderRisk();
  if(tab==='posts') return renderPosts();
  if(tab==='comments') return renderComments();
  if(tab==='logs') return renderLogs();
}

window.addEventListener('load',()=>switchTab('dashboard'));
</script>
